name: Fetch Google Sheet

on:
  schedule:
    - cron: '*/5 * * * *'  # تحديث كل 5 دقائق
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: سحب المشروع
        uses: actions/checkout@v4

      - name: تثبيت بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: تثبيت المكتبات
        run: pip install requests --quiet

      - name: تشغيل السكريبت
        run: python fetch_sheet.py

      - name: رفع التحديثات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git diff --cached --quiet || git commit -m "تحديث تلقائي $(date)"

          git push