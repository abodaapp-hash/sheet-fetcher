name: Fetch Google Sheet
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests
      
      - name: تشغيل السكريبت
        run: python fetch_sheet.py
      
      - name: دفع التغييرات إلى المستودع
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "تحديث ملفات البيانات" || echo "لا توجد تغييرات"
          git push
