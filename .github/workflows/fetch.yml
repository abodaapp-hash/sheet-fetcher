name: Fetch Google Sheet

on:
  schedule:
    - cron: '*/30 * * * *'  # كل 30 دقيقة
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: سحب المشروع
        uses: actions/checkout@v4

      - name: تثبيت بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install requests

      - name: تشغيل السكريبت
        run: python fetch_sheet.py

      - name: رفع التحديثات
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git commit -m "تحديث تلقائي $(date)" || echo "No changes"

          git push