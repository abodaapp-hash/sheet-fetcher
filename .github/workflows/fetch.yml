name: Fetch
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: pip install requests
      - run: python fetch_sheet.py
      - run: |
          git config user.name "bot"
          git add data/
          git diff --staged --quiet || git commit -m "auto"
          git push
